<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        height: 3000px;
        margin: 0;
      }

      .card {
        position: relative;
        width: 300px;
        height: 120px;
        border: 1px solid rgb(200, 200, 200);
        margin: 20px;
      }

      .close-button {
        position: absolute;
        top: 10px;
        right: 10px;
        width: 30px;
        height: 30px;
        border-radius: 50%;
        background-color: black;
        color: white;
        border: none;
        font-size: 14px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <button class="close-button">X</button>
    </div>
  </body>
</html>
