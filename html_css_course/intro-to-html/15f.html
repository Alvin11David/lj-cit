<!DOCTYPE html>
<html>
  <head>
    <style>
      .product-container {
        position: relative;
        display: inline-block;
        border: 1px solid rgb(200, 200, 200);
      }

      .product-image {
        width: 280px;
        height: 300px;
        object-fit: cover;
        display: block;
      }

      .badge {
        position: absolute;
        top: 10px;
        right: 10px;
        background-color: black;
        color: white;
        font-family: Arial;
        font-size: 13px;
        font-weight: bold;
        padding: 6px 10px;
      }

      .add-to-cart {
        position: absolute;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        background-color: white;
        color: black;
        border: 1px solid rgb(180, 180, 180);
        padding: 10px 20px;
        font-size: 14px;
        font-family: Arial;
        cursor: pointer;
        white-space: nowrap;
      }
    </style>
  </head>
  <body>
    <div class="product-container">
      <img class="product-image" src="shirt.jpeg">
      <div class="badge">20% OFF</div>
      <button class="add-to-cart">Add to Cart</button>
    </div>
  </body>
</html>
