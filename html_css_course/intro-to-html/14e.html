<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        height: 3000px;
        margin: 0;
      }

      .fb-header {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: 60px;
        background-color: white;
        border-bottom: 1px solid rgb(200, 200, 200);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
      }

      .fb-left {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .fb-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        object-fit: cover;
      }

      .fb-name {
        font-family: Arial;
        font-size: 16px;
        font-weight: bold;
        margin: 0;
      }

      .fb-right {
        display: flex;
        gap: 10px;
      }

      .btn-add {
        background-color: rgb(50, 100, 220);
        color: white;
        border: none;
        padding: 8px 16px;
        font-size: 14px;
        border-radius: 6px;
        cursor: pointer;
      }

      .btn-message {
        background-color: white;
        color: black;
        border: 1px solid rgb(180, 180, 180);
        padding: 8px 16px;
        font-size: 14px;
        border-radius: 6px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="fb-header">
      <div class="fb-left">
        <img class="fb-avatar" src="cat.jpeg">
        <p class="fb-name">Oliver Cat</p>
      </div>
      <div class="fb-right">
        <button class="btn-add">Add Friend</button>
        <button class="btn-message">Message</button>
      </div>
    </div>
  </body>
</html>
