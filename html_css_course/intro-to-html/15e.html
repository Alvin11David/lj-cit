<!DOCTYPE html>
<html>
  <head>
    <style>
      .product-container {
        position: relative;
        display: inline-block;
      }

      .product-image {
        width: 250px;
        height: 280px;
        object-fit: cover;
        display: block;
      }

      .badge {
        position: absolute;
        top: 10px;
        right: 10px;
        background-color: black;
        color: white;
        font-family: Arial;
        font-size: 13px;
        font-weight: bold;
        padding: 6px 10px;
      }
    </style>
  </head>
  <body>
    <div class="product-container">
      <img class="product-image" src="shirt.jpeg">
      <div class="badge">20% OFF</div>
    </div>
  </body>
</html>
