<style>
  .cards-wrapper {
    font-family: Arial;
    padding: 16px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }

  .friend-card {
    border: 1px solid rgb(220, 220, 220);
  }

  .friend-card img.pet-photo {
    width: 100%;
    height: 200px;
    object-fit: cover;
    display: block;
  }

  .friend-info {
    padding: 10px 12px;
  }

  .friend-name {
    font-size: 15px;
    font-weight: bold;
    margin: 0 0 6px 0;
  }

  .mutual-row {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 10px;
  }

  .mutual-icon {
    width: 22px;
    height: 22px;
    border-radius: 50%;
    object-fit: cover;
  }

  .mutual-text {
    font-size: 13px;
    color: rgb(100, 100, 100);
    margin: 0;
  }

  .add-btn {
    background-color: rgb(50, 100, 220);
    color: white;
    border: none;
    padding: 8px 14px;
    font-size: 13px;
    cursor: pointer;
    border-radius: 4px;
    width: 100%;
  }
</style>

<div class="cards-wrapper">
  <div class="friend-card">
    <img class="pet-photo" src="cat.jpeg">
    <div class="friend-info">
      <p class="friend-name">Oliver</p>
      <div class="mutual-row">
        <img class="mutual-icon" src="cat.jpeg">
        <p class="mutual-text">2 mutual friends</p>
      </div>
      <button class="add-btn">Add Friend</button>
    </div>
  </div>
  <div class="friend-card">
    <img class="pet-photo" src="caat.jpeg">
    <div class="friend-info">
      <p class="friend-name">Mimi</p>
      <div class="mutual-row">
        <img class="mutual-icon" src="caat.jpeg">
        <p class="mutual-text">3 mutual friends</p>
      </div>
      <button class="add-btn">Add Friend</button>
    </div>
  </div>
  <div class="friend-card">
    <img class="pet-photo" src="bull.jpeg">
    <div class="friend-info">
      <p class="friend-name">Rex</p>
      <div class="mutual-row">
        <img class="mutual-icon" src="bull.jpeg">
        <p class="mutual-text">4 mutual friends</p>
      </div>
      <button class="add-btn">Add Friend</button>
    </div>
  </div>
</div>
