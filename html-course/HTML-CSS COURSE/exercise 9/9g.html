<!DOCTYPE html>
<html>
  <head>
    <style>
      .container {
        width: 300px;
        border: 1px solid #ccc;
        padding: 10px;
        display: inline-block;
        box-shadow: (0, 0, 0 0.15s);
      }

      .profile {
        width: 300px;
      }
      .name {
        font-family: poppins;
        margin-bottom: 10px;
      }

      .friends {
        font-family: poppins;
        color: rgb(63, 60, 60);
        margin-top: 1px;
      }

      .add-button {
        background-color: blue;
        color: white;
        border: none;
        border-radius: 2px;
        font-family: poppins;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img class="profile" src="mee.jpeg" />
      <p class="name"> <strong>Oliver</strong></p>
      <p class="friends">2 mutual friends</p>

      <button class="add-button">Add friend</button>
    </div>

    <div class="container">
        <img class="profile" src="mee.jpeg" />
        <p class="name"> <strong>Mimi</strong></p>
        <p class="friends">3 mutual friends</p>
  
        <button class="add-button">Add friend</button>
      </div>

      <div class="container">
        <img class="profile" src="mee.jpeg" />
        <p class="name"> <strong>Rex</strong></p>
        <p class="friends">4 mutual friends</p>
  
        <button class="add-button">Add friend</button>
      </div>
  </body>
</html>
