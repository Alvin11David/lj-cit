<!DOCTYPE html>
<html>
  <head>
    <style>
      .container {
        width: 400px;
        border: 1px solid #ccc;
        padding: 15px;
        border-radius: 10px;
      }

      .profile {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        vertical-align: middle;
      }

      .tweet-text {
        display: inline-block;
        margin-left: 10px;
        vertical-align: middle;
        color: gray;
      }

      .tweet-button {
        float: right;
        margin-top: 10px;
        padding: 8px 15px;
        background-color: #1da1f2;
        color: white;
        border: none;
        border-radius: 20px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <img class="profile" src="mee.jpeg" />

      <p class="tweet-text">What's happening?</p>

      <button class="tweet-button">Tweet</button>
    </div>
  </body>
</html>
