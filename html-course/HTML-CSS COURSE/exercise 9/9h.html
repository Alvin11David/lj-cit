<!DOCTYPE html>
<html>
  <head>
    <style>
      body {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .google-box {
        font-family: Arial;
        padding: 30px 40px;
        width: 420px;
        text-align: center;
      }

      .google-logo {
        width: 180px;
        margin-bottom: 20px;
      }

      .google-input {
        width: 100%;
        padding: 12px 20px;
        border: none;
        border-radius: 4px;
        font-size: 12px;
        box-shadow: 0 2px 8px rgb(0, 0, 0, 0.2);
        outline: none;
        box-sizing: border-box;
      }

      .google-search,
      .feeling {
        display: inline-block;
        background-color: rgb(235, 232, 232);
        color: black;
        padding: 10px 20px;
        margin-top: 20px;
        margin-right: 10px;
        border-radius: 5px;
        font-family: Arial;
        cursor: pointer;
      }
    </style>
  </head>

  <body>
    <div class="google-box">
      <img
        class="google-logo"
        src="https://www.google.com/images/branding/googlelogo/2x/googlelogo_color_272x92dp.png"
      />

      <input
        class="google-input"
        type="text"
        placeholder="Search Google or type URL"
      />

      <p class="google-search">Google Search</p>
      <p class="feeling">I'm Feeling Lucky</p>
    </div>
  </body>
</html>
